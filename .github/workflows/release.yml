name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --locked --release --target "${{ matrix.target }}"
      - name: Package
        run: |
          version="${GITHUB_REF_NAME#v}"
          package="ucp-${version}-${{ matrix.target }}"
          mkdir -p "$package"
          cp "target/${{ matrix.target }}/release/ucp" "$package/"
          cp README.md LICENSE "$package/"
          tar -czf "$package.tar.gz" "$package"
          shasum -a 256 "$package.tar.gz" > "$package.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ucp-${{ matrix.target }}
          path: |
            ucp-*.tar.gz
            ucp-*.tar.gz.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Build checksum manifest
        run: |
          cat dist/*.sha256 > dist/checksums.txt
          cat dist/checksums.txt
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/checksums.txt \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "See README.md for installation and setup instructions."
